services:
  mysql:
    image: mysql:8.0.36
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: "L@nk0usm@ne"
      MYSQL_DATABASE: mydb
      MYSQL_USER: user
      MYSQL_PASSWORD: "L@nk0usm@ne"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-pL@nk0usm@ne"]
      interval: 5s
      timeout: 20s
      retries: 10

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    restart: always
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      PMA_HOST: mysql
      PMA_USER: root
      PMA_PASSWORD: "L@nk0usm@ne"
      UPLOAD_LIMIT: 100M
    ports:
      - "8181:80"

volumes:
  mysql_data:
